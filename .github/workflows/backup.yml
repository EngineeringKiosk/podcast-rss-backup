name: RSS Feed Backup

on:
  # Run monthly on the 1st day at 00:00 UTC
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Run RSS backup script
        run: |
          chmod +x ./scripts/backup-rss.sh
          ./scripts/backup-rss.sh https://engineeringkiosk.dev/podcast/rss

      - name: Get current date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Commit changes
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: RSS feed backup ${{ steps.date.outputs.date }}"
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
          commit_author: "GitHub Actions Bot <actions@github.com>"
          file_pattern: "rss_feed_backup/*.xml rss_feed_backup/*.json"
          skip_dirty_check: false
          skip_push: true

      - name: Push changes with retry
        if: steps.auto-commit.outputs.changes_detected == 'true'
        run: |
          max_retries=3
          for attempt in $(seq 1 $max_retries); do
            echo "Push attempt $attempt of $max_retries"
            if git push origin main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed, pulling with rebase and retrying..."
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          echo "Push failed after $max_retries attempts"
          exit 1
